- name: vars preference
  hosts: local
  connection: local
  vars:
    NAME: "Ansible from play"
  vars_files:
  - course.yaml
  vars_prompt:
  - name: NAME
    prompt: Enter your name
    private: false
  tasks:
  - name: print name
    vars:
      NAME: "Ansible from TASK"
      ansible.builtin.debug:
        msg: "Hi {{ NAME }}"